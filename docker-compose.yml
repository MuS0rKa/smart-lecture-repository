version: '3.8'

services:
  backend:
    build: ./backend
    container_name: study-buddy-backend
    restart: always
    env_file: .env
    volumes:
      - ./backend/data:/app/data
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: study-buddy-frontend
    restart: always
    ports:
      - "8501:8501"
    environment:
      - BASE_URL=http://backend:8000
    depends_on:
      - backend